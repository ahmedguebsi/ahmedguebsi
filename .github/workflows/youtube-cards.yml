name: Update YouTube Cards

on:
  # Schedule is disabled until you configure your channel_id below.
  # Once configured, uncomment the schedule block to enable daily updates.
  # schedule:
  #   - cron: "0 0 * * *"  # Daily at midnight UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  update:
    name: Update README YouTube Cards
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Update YouTube cards in README
        uses: DenverCoder1/github-readme-youtube-cards@v1
        with:
          # TODO: Replace with your YouTube channel ID before enabling the schedule.
          # Find yours at: YouTube Studio → Settings → Channel → Advanced settings.
          channel_id: UCipSxT7a3rn81vGLw9lqRkg
          comment_tag_name: YOUTUBE-CARDS
          max_videos: 6
          bg_color: "#0d1117"
          title_color: "#ffffff"
          stats_color: "#dedede"
          border_radius: 5
          width: 250
          show_duration: true
